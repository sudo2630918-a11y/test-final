<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌡️ 폭염·기후변화 분석 대시보드</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:'Malgun Gothic',sans-serif; }
  body{
    background:linear-gradient(135deg,#FFE5EC,#FFF1C1,#DFFFE0,#DDEBFF,#EAD7FF);
    min-height:100vh; padding:20px;
  }
  .container{ max-width:1200px; margin:auto; }
  h1{ text-align:center; margin-bottom:8px; color:#444; }
  .subtitle{ text-align:center; margin-bottom:25px; color:#777; font-size:14px; }

  .main-grid{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:20px;
    margin-bottom:20px;
  }
  @media (max-width:820px){
    .main-grid{ grid-template-columns:1fr; }
  }

  .map-box{
    background:white;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    padding:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .map-title{ font-size:16px; color:#666; margin-bottom:6px; text-align:center; }
  #koreaMap{ width:100%; max-width:300px; height:auto; }

  .peninsula{
    fill:#EAF3FF;
    stroke:#B9D3F2;
    stroke-width:2;
    transition:fill 0.3s;
  }

  .region-dot{
    cursor:pointer;
  }
  .region-dot circle{
    fill:#ffb6d5;
    stroke:#ffffff;
    stroke-width:2;
    transition:all 0.25s ease;
  }
  .region-dot:hover circle{
    fill:#ff8fbf;
    r:11;
  }
  .region-dot.active circle{
    fill:#ff3d8b;
    r:12;
    stroke:#ffffff;
    stroke-width:3;
  }
  .region-dot text{
    font-size:11px;
    fill:#555;
    font-weight:bold;
    pointer-events:none;
    paint-order:stroke;
    stroke:#ffffff;
    stroke-width:3px;
  }
  .region-dot.active text{
    fill:#ff3d8b;
    font-size:12px;
  }

  .right-col{ display:flex; flex-direction:column; gap:20px; }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
  }
  .card{
    background:white; padding:20px; border-radius:20px; text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
  }
  .card h2{ font-size:14px; color:#777; margin-bottom:8px; }
  .value{ font-size:30px; font-weight:bold; color:#ff69b4; }

  .selected-region{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#444;
    margin-bottom:4px;
  }

  .graph-box, .analysis{
    background:white; padding:20px; border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
  }
  .graph-title{ text-align:center; font-size:20px; margin-bottom:10px; }
  svg#graph{ width:100%; height:300px; }
  .point{ fill:#ff69b4; }
  .line{ stroke:#ff69b4; stroke-width:4; fill:none; }
  .axis{ stroke:#555; stroke-width:2; }
  .analysis{ line-height:1.8; }
</style>
</head>
<body>
<div class="container">
  <h1>🌡️ 폭염·기후변화 분석 대시보드 📈</h1>
  <div class="subtitle">지도에서 지역을 선택해보세요 🗺️</div>

  <div class="main-grid">
    <div class="map-box">
      <div class="map-title">📍 지역 선택</div>
      <svg id="koreaMap" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="right-col">
      <div class="selected-region" id="selectedRegionLabel"></div>
      <div class="cards">
        <div class="card"><h2>🌡️ 평균 최고기온</h2><div class="value" id="highTemp"></div></div>
        <div class="card"><h2>🌙 평균 최저기온</h2><div class="value" id="lowTemp"></div></div>
        <div class="card"><h2>☀️ 평균기온</h2><div class="value" id="avgTemp"></div></div>
      </div>

      <div class="graph-box">
        <div class="graph-title">📈 2020~2025 여름 평균기온 추이</div>
        <svg id="graph"></svg>
      </div>

      <div class="analysis">
        <h3>🔍 분석 결과</h3>
        <p id="analysisText"></p>
      </div>
    </div>
  </div>
</div>

<script>
const climateData = {
  서울:{high:31.2, low:23.6, avg:27.4, yearly:[25.1,25.4,25.8,26.2,26.6,27.0], x:170, y:110},
  인천:{high:29.4, low:23.1, avg:26.2, yearly:[24.0,24.2,24.6,25.0,25.4,25.8], x:128, y:118},
  수원:{high:31.1, low:23.4, avg:27.0, yearly:[24.9,25.2,25.5,25.9,26.3,26.7], x:178, y:142},
  양평:{high:29.9, low:22.1, avg:26.0, yearly:[23.8,24.1,24.5,24.9,25.3,25.7], x:212, y:118},
  대전:{high:31.8, low:23.5, avg:27.6, yearly:[25.0,25.3,25.7,26.1,26.5,26.9], x:182, y:222},
  전주:{high:32.0, low:23.8, avg:27.9, yearly:[25.4,25.8,26.1,26.5,27.0,27.4], x:150, y:272},
  대구:{high:33.1, low:24.1, avg:28.6, yearly:[26.0,26.3,26.7,27.1,27.6,28.0], x:242, y:282},
  울산:{high:30.5, low:24.0, avg:27.2, yearly:[24.7,25.0,25.4,25.8,26.1,26.5], x:276, y:312},
  부산:{high:29.8, low:24.3, avg:27.0, yearly:[24.8,25.0,25.2,25.5,25.8,26.2], x:280, y:334},
  거제:{high:29.5, low:24.5, avg:27.0, yearly:[24.6,24.9,25.2,25.6,26.0,26.4], x:250, y:358}
};

const years = ["2020","2021","2022","2023","2024","2025"];

// 간략화된 한반도(남한) 실루엣
const peninsulaPath = "M180,25 L220,20 L245,55 L260,90 L285,150 L295,215 " +
  "L285,265 L300,300 L275,335 L245,355 L260,378 L225,398 " +
  "L190,408 L150,388 L128,340 L108,278 L98,218 L118,168 " +
  "L92,148 L112,108 L142,58 Z";

const mapSvg = document.getElementById("koreaMap");
mapSvg.innerHTML = `<path class="peninsula" d="${peninsulaPath}"></path>`;

for (const region in climateData) {
  const d = climateData[region];
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "region-dot");
  g.setAttribute("id", "dot-" + region);
  g.innerHTML = `
    <circle cx="${d.x}" cy="${d.y}" r="9"></circle>
    <text x="${d.x + 13}" y="${d.y + 4}">${region}</text>
  `;
  g.addEventListener("click", () => updateData(region));
  mapSvg.appendChild(g);
}

function drawGraph(data) {
  const svg = document.getElementById("graph");
  svg.innerHTML = "";
  const width = 800, height = 260;
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  const min = Math.min(...data) - 1;
  const max = Math.max(...data) + 1;
  let points = "";
  data.forEach((temp, index) => {
    const x = 70 + (index * 130);
    const y = height - 40 - ((temp - min) / (max - min)) * 180;
    points += `${x},${y} `;
    svg.innerHTML += `
      <circle class="point" cx="${x}" cy="${y}" r="6"></circle>
      <text x="${x - 15}" y="${height - 10}" font-size="12">${years[index]}</text>
      <text x="${x - 10}" y="${y - 12}" font-size="12">${temp}℃</text>
    `;
  });
  svg.innerHTML += `
    <line class="axis" x1="50" y1="20" x2="50" y2="${height - 30}"></line>
    <line class="axis" x1="50" y1="${height - 30}" x2="${width - 20}" y2="${height - 30}"></line>
    <polyline class="line" points="${points}"></polyline>
  `;
}

function updateData(region) {
  const data = climateData[region];
  document.getElementById("highTemp").innerText = data.high + "℃";
  document.getElementById("lowTemp").innerText = data.low + "℃";
  document.getElementById("avgTemp").innerText = data.avg + "℃";
  document.getElementById("selectedRegionLabel").innerText = "📍 " + region;
  drawGraph(data.yearly);

  const increase = (data.yearly[5] - data.yearly[0]).toFixed(1);
  document.getElementById("analysisText").innerHTML =
    `${region}의 여름 평균기온은 2020년부터 2025년까지 약 <b>${increase}℃</b> 상승했습니다. ` +
    `이는 기후변화와 도시 열섬현상으로 인한 폭염·열대야 증가와 관련이 있으며, 온열질환 위험 증가에도 영향을 줄 수 있습니다.`;

  document.querySelectorAll(".region-dot").forEach(el => el.classList.remove("active"));
  document.getElementById("dot-" + region).classList.add("active");
}

updateData("서울");
</script>
</body>
</html>
