<!DOCTYPE html>

<style> *{ margin:0; padding:0; box-sizing:border-box; font-family:'Malgun Gothic',sans-serif; } body{ background:linear-gradient(135deg,#FFE5EC,#FFF1C1,#DFFFE0,#DDEBFF,#EAD7FF); min-height:100vh; padding:20px; } .container{ max-width:1200px; margin:auto; } h1{ text-align:center; margin-bottom:25px; color:#444; } .selector{ text-align:center; margin-bottom:25px; } select{ padding:12px 20px; font-size:18px; border:none; border-radius:15px; background:white; box-shadow:0 3px 10px rgba(0,0,0,0.1); cursor:pointer; } .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; margin-bottom:25px; } .card{ background:white; padding:25px; border-radius:20px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.08); } .value{ font-size:34px; font-weight:bold; color:#ff69b4; } .graph-box, .analysis{ background:white; padding:20px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.08); margin-bottom:20px; } .graph-title{ text-align:center; font-size:22px; margin-bottom:10px; } svg{ width:100%; height:350px; } .point{ fill:#ff69b4; } .line{ stroke:#ff69b4; stroke-width:4; fill:none; } .axis{ stroke:#555; stroke-width:2; } .analysis{ line-height:1.8; } </style>

<script> const climateData = { 서울:{high:31.2,low:23.6,avg:27.4,yearly:[25.1,25.4,25.8,26.2,26.6,27.0]}, 부산:{high:29.8,low:24.3,avg:27.0,yearly:[24.8,25.0,25.2,25.5,25.8,26.2]}, 대구:{high:33.1,low:24.1,avg:28.6,yearly:[26.0,26.3,26.7,27.1,27.6,28.0]}, 인천:{high:29.4,low:23.1,avg:26.2,yearly:[24.0,24.2,24.6,25.0,25.4,25.8]}, 대전:{high:31.8,low:23.5,avg:27.6,yearly:[25.0,25.3,25.7,26.1,26.5,26.9]}, 울산:{high:30.5,low:24.0,avg:27.2,yearly:[24.7,25.0,25.4,25.8,26.1,26.5]}, 수원:{high:31.1,low:23.4,avg:27.0,yearly:[24.9,25.2,25.5,25.9,26.3,26.7]}, 양평:{high:29.9,low:22.1,avg:26.0,yearly:[23.8,24.1,24.5,24.9,25.3,25.7]}, 전주:{high:32.0,low:23.8,avg:27.9,yearly:[25.4,25.8,26.1,26.5,27.0,27.4]}, 거제:{high:29.5,low:24.5,avg:27.0,yearly:[24.6,24.9,25.2,25.6,26.0,26.4]} }; const years=["2020","2021","2022","2023","2024","2025"]; const select=document.getElementById("regionSelect"); for(const region in climateData){ const option=document.createElement("option"); option.value=region; option.textContent=region; select.appendChild(option); } function drawGraph(data){ const svg=document.getElementById("graph"); svg.innerHTML=""; const width=800; const height=300; svg.setAttribute("viewBox",`0 0 ${width} ${height}`); const min=Math.min(...data)-1; const max=Math.max(...data)+1; let points=""; data.forEach((temp,index)=>{ const x=70+(index*130); const y=height-40-((temp-min)/(max-min))*220; points+=`${x},${y} `; svg.innerHTML+=` <circle class="point" cx="${x}" cy="${y}" r="6"></circle> <text x="${x-15}" y="${height-10}" font-size="12">${years[index]}</text> <text x="${x-10}" y="${y-12}" font-size="12">${temp}℃</text> `; }); svg.innerHTML+=` <line class="axis" x1="50" y1="20" x2="50" y2="${height-30}"></line> <line class="axis" x1="50" y1="${height-30}" x2="${width-20}" y2="${height-30}"></line> <polyline class="line" points="${points}"></polyline> `; } function updateData(region){ const data=climateData[region]; document.getElementById("highTemp").innerText=data.high+"℃"; document.getElementBy
